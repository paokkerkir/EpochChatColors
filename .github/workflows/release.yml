name: Release EpochChatColors on changes
on:
  workflow_dispatch:
permissions:
  contents: write
  actions: read
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from TOC file
        id: get_version
        run: |
          VERSION=$(grep "## Version:" EpochChatColors.toc | sed 's/## Version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Create EpochChatColors zip
        run: |
          mkdir EpochChatColors
          rsync -av --exclude='.git' --exclude='.github' --exclude='*.md' --exclude='LICENSE' --exclude='.gitattributes' --exclude='EpochChatColors' . EpochChatColors/
          zip -r EpochChatColors.zip EpochChatColors/

      - name: Create Versioned Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: EpochChatColors-v${{ steps.get_version.outputs.version }}
          name: EpochChatColors v${{ steps.get_version.outputs.version }}
          files: EpochChatColors.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
